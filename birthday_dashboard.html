<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0e17; --surface: #1a1927; --surface2: #232234;
      --border: rgba(255,255,255,0.08); --gold: #e8c97e; --gold-dim: #a8894e;
      --text: #f0eefc; --muted: #8c8aa8; --accent: #c77dff; --radius: 16px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { text-align: center; padding: 3.5rem 1rem 2rem; position: relative; }
    .stars { position: absolute; top: 0; left: 0; right: 0; height: 100%; overflow: hidden; pointer-events: none; z-index: 0; }
    .star  { position: absolute; border-radius: 50%; background: var(--gold); animation: twinkle 3s ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:.7} }
    header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem,5vw,3.2rem); font-weight: 600; color: var(--gold); letter-spacing:.01em; position:relative;z-index:1; }
    header p  { color: var(--muted); font-size: .95rem; margin-top: .4rem; position:relative;z-index:1; }

    .month-nav { display:flex; align-items:center; justify-content:center; gap:1rem; padding:1.5rem 1rem 0; }
    .month-nav button { background:var(--surface); border:1px solid var(--border); color:var(--text); width:40px;height:40px; border-radius:50%; font-size:1.1rem; cursor:pointer; transition:background .2s,border-color .2s; display:flex;align-items:center;justify-content:center; }
    .month-nav button:hover { background:var(--surface2); border-color:var(--gold-dim); }
    .month-label { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:600; color:var(--text); min-width:220px; text-align:center; }

    .month-pills { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; padding:1.25rem 1rem 0; max-width:700px; margin:0 auto; }
    .pill { padding:5px 14px; border-radius:999px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:.8rem; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .18s; }
    .pill:hover  { border-color:var(--gold-dim); color:var(--text); }
    .pill.active { background:var(--gold); border-color:var(--gold); color:#1a1200; font-weight:500; }
    .pill .dot   { display:inline-block; width:5px;height:5px; border-radius:50%; background:var(--accent); margin-left:5px; vertical-align:middle; }

    main { max-width:1100px; margin:2.5rem auto 4rem; padding:0 1.25rem; }

    .stats-bar { display:flex; gap:12px; margin-bottom:2rem; flex-wrap:wrap; }
    .stat-chip  { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 18px; font-size:.85rem; color:var(--muted); }
    .stat-chip strong { color:var(--gold); font-size:1.3rem; font-weight:500; display:block; line-height:1.1; }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem 1rem 1.25rem; text-align:center; transition:transform .2s,border-color .2s; animation:fadeUp .35s ease both; }
    .card:hover { transform:translateY(-4px); border-color:var(--gold-dim); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .card:nth-child(1){animation-delay:.03s}.card:nth-child(2){animation-delay:.06s}
    .card:nth-child(3){animation-delay:.09s}.card:nth-child(4){animation-delay:.12s}
    .card:nth-child(5){animation-delay:.15s}.card:nth-child(6){animation-delay:.18s}
    .card:nth-child(7){animation-delay:.21s}.card:nth-child(8){animation-delay:.24s}

    .avatar-wrap { position:relative; width:88px;height:88px; margin:0 auto 1rem; }
    .avatar-wrap img,
    .avatar-wrap .initials { width:88px;height:88px; border-radius:50%; object-fit:cover; }
    .avatar-wrap .initials  { display:flex;align-items:center;justify-content:center; font-size:1.6rem;font-weight:500; background:var(--surface2); color:var(--accent); border:2px solid var(--border); }
    .avatar-ring { position:absolute;inset:-4px; border-radius:50%; border:2px solid var(--gold); animation:spin 8s linear infinite; border-top-color:transparent;border-bottom-color:transparent; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .today-badge { position:absolute;top:-2px;right:-2px; background:var(--gold); color:#1a1200; font-size:.65rem;font-weight:600; padding:2px 6px; border-radius:999px; white-space:nowrap; }

    .card h3    { font-family:'Playfair Display',serif; font-size:1rem;font-weight:600; color:var(--text); margin-bottom:4px; }
    .card .bday { font-size:.82rem; color:var(--muted); }
    .card .age-tag { display:inline-block; margin-top:10px; padding:3px 12px; border-radius:999px; background:var(--surface2); border:1px solid var(--border); font-size:.75rem; color:var(--gold); }

    .empty { text-align:center; padding:4rem 1rem; color:var(--muted); }
    .empty .icon { font-size:3rem; margin-bottom:1rem; }
    .loader { text-align:center; padding:4rem; color:var(--muted); font-size:.9rem; }
    .loader::after { content:''; display:block; width:32px;height:32px; margin:1rem auto 0; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }

    footer { text-align:center; padding:2rem 1rem; font-size:.78rem; color:var(--muted); border-top:1px solid var(--border); }
    footer a { color:var(--gold-dim); text-decoration:none; }
    footer code { background:var(--surface2); padding:2px 6px; border-radius:4px; font-size:.75rem; }
  </style>
</head>
<body>

<header>
  <div class="stars" id="stars"></div>
  <h1>🎂 Birthday Board</h1>
  <p>Celebrating the people who make us great</p>
</header>

<nav class="month-nav">
  <button id="prev-btn">&#8592;</button>
  <div class="month-label" id="month-label"></div>
  <button id="next-btn">&#8594;</button>
</nav>
<div class="month-pills" id="month-pills"></div>

<main>
  <div class="stats-bar" id="stats-bar"></div>
  <div id="content"><div class="loader">Loading birthdays…</div></div>
</main>

<footer>
  To add a member: update <a href="people.csv"><code>people.csv</code></a> and add their photo to the <code>photos/</code> folder —
  name it exactly as written in the <code>photo_key</code> column (e.g. <code>stanley.jpg</code> or <code>okoro.jpg</code>)
</footer>

<script>
  // ================================================================
  //  PHOTO FOLDER — relative to this HTML file in your GitHub repo
  // ================================================================
  const PHOTO_FOLDER = 'photos/';
  const PHOTO_EXTS   = ['jpg', 'jpeg', 'png', 'webp'];

  const MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];

  let allPeople    = [];
  let currentMonth = new Date().getMonth();

  /* ── Stars ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s`;
    starsEl.appendChild(s);
  }

  /* ── CSV parser ── */
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const rawH   = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
    const headers = rawH.map(h => h.toLowerCase());

    const firstIdx  = headers.findIndex(h => h.includes('first'));
    const lastIdx   = headers.findIndex(h => h.includes('last') || h.includes('surname'));
    const nameIdx   = headers.findIndex(h => h === 'name' || h.includes('full'));
    const bdayIdx   = headers.findIndex(h => h.includes('birth') || h.includes('dob') || h === 'date' || h.includes('bday'));
    // photo_key: the exact filename (no extension) to load from photos/ folder
    // e.g. "stanley" loads photos/stanley.jpg
    // If two people share a first name, give the second one their last name as the key
    const keyIdx    = headers.findIndex(h => h === 'photo_key' || h === 'photokey' || h === 'photo_name' || h === 'pic_key');

    return lines.slice(1).map(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (const c of line) {
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim());

      let name = '';
      if (firstIdx >= 0 && lastIdx >= 0) {
        name = `${cols[firstIdx]||''} ${cols[lastIdx]||''}`.trim();
      } else if (nameIdx >= 0) {
        name = cols[nameIdx] || '';
      } else {
        name = cols[0] || '';
      }

      const birthday  = bdayIdx >= 0 ? cols[bdayIdx] || '' : (cols[1] || '');
      // photo_key is what YOU put in the CSV — it becomes the filename
      const photo_key = keyIdx  >= 0 ? (cols[keyIdx] || '').trim().toLowerCase() : '';
      return { name, birthday, photo_key };
    }).filter(r => r.name && r.birthday);
  }

  /* ── Date helpers ── */
  function parseDate(str) {
    const fns = [
      v => { const d = new Date(v); return isNaN(d) ? null : d; },
      v => { const [d,m,y] = v.split(/[\/\-\.]/); return new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`); },
      v => { const [m,d,y] = v.split(/[\/\-\.]/); return new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`); },
    ];
    for (const fn of fns) {
      try { const d = fn(str); if (d && !isNaN(d)) return d; } catch {}
    }
    return null;
  }
  function isTodayBirthday(d) { const t = new Date(); return d.getMonth()===t.getMonth() && d.getDate()===t.getDate(); }
  function turningAge(date)    { return new Date().getFullYear() - date.getFullYear(); }
  function formatDay(date)     { return date.toLocaleDateString('en-GB', { day:'numeric', month:'long' }); }
  function initials(name)      { return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase(); }

  /* ── Build avatar HTML with extension fallback chain ── */
  function avatarHTML(person) {
    const ini      = initials(person.name);
    const fallback = `<div class="initials">${ini}</div>`;

    // No photo_key? show initials immediately
    if (!person.photo_key) return fallback;

    const base = PHOTO_FOLDER + person.photo_key;

    // Build onerror chain: tries jpg → jpeg → png → webp → initials avatar
    // Each failed load tries the next extension, last one falls back to initials
    const srcs = PHOTO_EXTS.map(ext => `${base}.${ext}`);

    // We inject a small helper that steps through extensions one by one
    // stored on the img element itself to avoid global state
    return `<img
      src="${srcs[0]}"
      alt="${person.name}"
      data-srcs="${srcs.slice(1).join('|')}"
      onerror="
        var rest = this.dataset.srcs ? this.dataset.srcs.split('|') : [];
        if (rest.length) {
          this.src = rest[0];
          this.dataset.srcs = rest.slice(1).join('|');
        } else {
          this.outerHTML = '${fallback.replace(/'/g,"&#39;")}';
        }
      "
    >`;
  }

  /* ── Render pills ── */
  function renderPills() {
    const container = document.getElementById('month-pills');
    container.innerHTML = '';
    MONTHS.forEach((m, i) => {
      const count = allPeople.filter(p => p._date && p._date.getMonth() === i).length;
      const btn = document.createElement('button');
      btn.className = 'pill' + (i === currentMonth ? ' active' : '');
      btn.textContent = m.slice(0,3);
      if (count > 0) {
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.title = `${count} birthday${count>1?'s':''}`;
        btn.appendChild(dot);
      }
      btn.addEventListener('click', () => { currentMonth = i; render(); });
      container.appendChild(btn);
    });
  }

  /* ── Render cards ── */
  function render() {
    document.getElementById('month-label').textContent = MONTHS[currentMonth];
    document.querySelectorAll('.pill').forEach((p, i) => p.classList.toggle('active', i === currentMonth));

    const people = allPeople
      .filter(p => p._date && p._date.getMonth() === currentMonth)
      .sort((a, b) => a._date.getDate() - b._date.getDate());

    document.getElementById('stats-bar').innerHTML = `
      <div class="stat-chip"><strong>${people.length}</strong>Celebrating</div>
      <div class="stat-chip"><strong>${allPeople.length}</strong>People total</div>
      ${people.some(p => p._isToday) ? '<div class="stat-chip"><strong>🎉</strong>Today!</div>' : ''}
    `;

    const content = document.getElementById('content');
    if (!people.length) {
      content.innerHTML = `<div class="empty"><div class="icon">🌙</div><p>No birthdays in ${MONTHS[currentMonth]}</p></div>`;
      return;
    }

    content.innerHTML = `<div class="grid">${people.map(p => {
      const todayBadge = p._isToday ? `<span class="today-badge">Today! 🎂</span>` : '';
      return `<div class="card">
        <div class="avatar-wrap">
          ${avatarHTML(p)}
          <div class="avatar-ring"></div>
          ${todayBadge}
        </div>
        <h3>${p.name}</h3>
        <div class="bday">${formatDay(p._date)}</div>
        <div class="age-tag">Turning ${turningAge(p._date)}</div>
      </div>`;
    }).join('')}</div>`;
  }

  /* ── Load CSV from repo ── */
  async function loadData() {
    try {
      const res = await fetch('people.csv');
      if (!res.ok) throw new Error();
      const rows = parseCSV(await res.text());
      allPeople = rows.map(r => {
        const d = parseDate(r.birthday);
        return { ...r, _date: d, _isToday: d ? isTodayBirthday(d) : false };
      });
    } catch {
      // Demo fallback
      allPeople = [
        { name:'Alice Smith',  birthday:'1990-06-15', photo_key:'alice',  _date:new Date(1990,5,15), _isToday:false },
        { name:'Alice Jones',  birthday:'1988-06-22', photo_key:'jones',  _date:new Date(1988,5,22), _isToday:false },
        { name:'Bob Brown',    birthday:'1985-06-03', photo_key:'bob',    _date:new Date(1985,5,3),  _isToday:false },
        { name:'Carol White',  birthday:'1992-03-22', photo_key:'carol',  _date:new Date(1992,2,22), _isToday:false },
        { name:'David Green',  birthday:'2000-06-06', photo_key:'david',  _date:new Date(2000,5,6),  _isToday:false },
      ];
    }
    renderPills();
    render();
  }

  document.getElementById('prev-btn').addEventListener('click', () => { currentMonth=(currentMonth+11)%12; render(); renderPills(); });
  document.getElementById('next-btn').addEventListener('click', () => { currentMonth=(currentMonth+1)%12;  render(); renderPills(); });

  loadData();
</script>
</body>
</html>

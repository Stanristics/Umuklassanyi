<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0e17;
      --surface:   #1a1927;
      --surface2:  #232234;
      --border:    rgba(255,255,255,0.08);
      --gold:      #e8c97e;
      --gold-dim:  #a8894e;
      --text:      #f0eefc;
      --muted:     #8c8aa8;
      --accent:    #c77dff;
      --radius:    16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      text-align: center;
      padding: 3.5rem 1rem 2rem;
      position: relative;
    }
    .stars {
      position: absolute; top: 0; left: 0; right: 0; height: 100%;
      overflow: hidden; pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--gold);
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.7; }
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.01em;
      position: relative; z-index: 1;
    }
    header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.4rem;
      position: relative; z-index: 1;
    }

    /* ── Month Nav ─────────────────────────────────── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1.5rem 1rem 0;
    }
    .month-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .month-nav button:hover {
      background: var(--surface2);
      border-color: var(--gold-dim);
    }
    .month-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text);
      min-width: 220px;
      text-align: center;
    }

    /* ── Month pill tabs ───────────────────────────── */
    .month-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 1.25rem 1rem 0;
      max-width: 700px;
      margin: 0 auto;
    }
    .pill {
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
    }
    .pill:hover { border-color: var(--gold-dim); color: var(--text); }
    .pill.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #1a1200;
      font-weight: 500;
    }
    .pill .dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 5px;
      vertical-align: middle;
    }

    /* ── Main content ──────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 2.5rem auto 4rem;
      padding: 0 1.25rem;
    }

    /* ── Stats bar ─────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .stat-chip strong {
      color: var(--gold);
      font-size: 1.3rem;
      font-weight: 500;
      display: block;
      line-height: 1.1;
    }

    /* ── Cards grid ────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1rem 1.25rem;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
      animation: fadeUp 0.35s ease both;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--gold-dim);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* stagger */
    .card:nth-child(1)  { animation-delay: 0.03s }
    .card:nth-child(2)  { animation-delay: 0.06s }
    .card:nth-child(3)  { animation-delay: 0.09s }
    .card:nth-child(4)  { animation-delay: 0.12s }
    .card:nth-child(5)  { animation-delay: 0.15s }
    .card:nth-child(6)  { animation-delay: 0.18s }
    .card:nth-child(7)  { animation-delay: 0.21s }
    .card:nth-child(8)  { animation-delay: 0.24s }

    .avatar-wrap {
      position: relative;
      width: 80px; height: 80px;
      margin: 0 auto 1rem;
    }
    .avatar-wrap img,
    .avatar-wrap .initials {
      width: 80px; height: 80px;
      border-radius: 50%;
      object-fit: cover;
    }
    .avatar-wrap .initials {
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 500;
      background: var(--surface2);
      color: var(--accent);
      border: 2px solid var(--border);
    }
    .avatar-ring {
      position: absolute; inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      animation: spin 8s linear infinite;
      border-top-color: transparent;
      border-bottom-color: transparent;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .today-badge {
      position: absolute; top: -2px; right: -2px;
      background: var(--gold);
      color: #1a1200;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card .bday {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .card .age-tag {
      display: inline-block;
      margin-top: 10px;
      padding: 3px 12px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--gold);
    }

    /* ── Empty state ───────────────────────────────── */
    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }
    .empty .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty p { font-size: 1rem; }

    /* ── Loading ───────────────────────────────────── */
    .loader {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .loader::after {
      content: '';
      display: block;
      width: 32px; height: 32px;
      margin: 1rem auto 0;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ── Footer ────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--gold-dim); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="stars" id="stars"></div>
  <h1>🎂 Birthday Board</h1>
  <p>Celebrating the people who make us great</p>
</header>

<nav class="month-nav" aria-label="Month navigation">
  <button id="prev-btn" aria-label="Previous month">&#8592;</button>
  <div class="month-label" id="month-label"></div>
  <button id="next-btn" aria-label="Next month">&#8594;</button>
</nav>

<div class="month-pills" id="month-pills" role="tablist" aria-label="Pick a month"></div>

<main>
  <div class="stats-bar" id="stats-bar"></div>
  <div id="content"><div class="loader">Loading birthdays…</div></div>
</main>

<footer>
  Data from <a href="people.csv">people.csv</a> &middot; Update the file to add people &middot; Hosted on GitHub Pages
</footer>

<script>
  const MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];

  let allPeople = [];
  let currentMonth = new Date().getMonth(); // 0-indexed

  /* ── Generate starfield ──────────────────────────── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s`;
    starsEl.appendChild(s);
  }

  /* ── CSV parser (no library needed) ─────────────── */
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
      // handle quoted fields
      const cols = [];
      let cur = '', inQ = false;
      for (let c of line) {
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = cols[i] || '');
      return obj;
    }).filter(r => r.name && r.birthday);
  }

  /* ── Date helpers ────────────────────────────────── */
  const DATE_FMTS = [
    v => { const d = new Date(v); return isNaN(d) ? null : d; },
    v => { const [d,m,y] = v.split(/[\/\-]/); return new Date(`${y}-${m}-${d}`); },
    v => { const [m,d,y] = v.split(/[\/\-]/); return new Date(`${y}-${m}-${d}`); },
  ];
  function parseDate(str) {
    for (const fn of DATE_FMTS) {
      try { const d = fn(str); if (d && !isNaN(d)) return d; } catch {}
    }
    return null;
  }
  function getAge(date) {
    const today = new Date();
    let age = today.getFullYear() - date.getFullYear();
    const m = today.getMonth() - date.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < date.getDate())) age--;
    return age;
  }
  function isTodayBirthday(date) {
    const t = new Date();
    return date.getMonth() === t.getMonth() && date.getDate() === t.getDate();
  }
  function turningAge(date) {
    // age they're turning THIS calendar year in their birthday month
    return new Date().getFullYear() - date.getFullYear();
  }
  function formatDay(date) {
    return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'long' });
  }

  /* ── Initials from name ──────────────────────────── */
  function initials(name) {
    return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
  }

  /* ── Render pills ────────────────────────────────── */
  function renderPills() {
    const container = document.getElementById('month-pills');
    container.innerHTML = '';
    MONTHS.forEach((m, i) => {
      const count = allPeople.filter(p => p._date && p._date.getMonth() === i).length;
      const btn = document.createElement('button');
      btn.className = 'pill' + (i === currentMonth ? ' active' : '');
      btn.role = 'tab';
      btn.setAttribute('aria-selected', i === currentMonth);
      btn.textContent = m.slice(0, 3);
      if (count > 0) {
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.title = `${count} birthday${count > 1 ? 's' : ''}`;
        btn.appendChild(dot);
      }
      btn.addEventListener('click', () => { currentMonth = i; render(); });
      container.appendChild(btn);
    });
  }

  /* ── Render main content ─────────────────────────── */
  function render() {
    document.getElementById('month-label').textContent = MONTHS[currentMonth];

    // update pills
    document.querySelectorAll('.pill').forEach((p, i) => {
      p.classList.toggle('active', i === currentMonth);
      p.setAttribute('aria-selected', i === currentMonth);
    });

    const people = allPeople.filter(p => p._date && p._date.getMonth() === currentMonth)
      .sort((a, b) => a._date.getDate() - b._date.getDate());

    // stats
    const statsBar = document.getElementById('stats-bar');
    statsBar.innerHTML = `
      <div class="stat-chip"><strong>${people.length}</strong>Celebrating</div>
      <div class="stat-chip"><strong>${allPeople.length}</strong>People total</div>
      ${people.some(p => p._isToday) ? '<div class="stat-chip"><strong>🎉</strong>Today!</div>' : ''}
    `;

    // cards
    const content = document.getElementById('content');
    if (people.length === 0) {
      content.innerHTML = `<div class="empty"><div class="icon">🌙</div><p>No birthdays in ${MONTHS[currentMonth]}</p></div>`;
      return;
    }

    content.innerHTML = `<div class="grid">${people.map(p => {
      const photoSrc = p.photo ? p.photo.trim() : '';
      const avatarInner = photoSrc
        ? `<img src="${photoSrc}" alt="${p.name}" onerror="this.parentNode.innerHTML='<div class=\\"initials\\">${initials(p.name)}</div>'">`
        : `<div class="initials">${initials(p.name)}</div>`;

      const age = turningAge(p._date);
      const todayBadge = p._isToday ? `<span class="today-badge">Today!</span>` : '';

      return `<div class="card">
        <div class="avatar-wrap">
          ${avatarInner}
          <div class="avatar-ring"></div>
          ${todayBadge}
        </div>
        <h3>${p.name}</h3>
        <div class="bday">${formatDay(p._date)}</div>
        <div class="age-tag">Turning ${age}</div>
      </div>`;
    }).join('')}</div>`;
  }

  /* ── Load CSV ─────────────────────────────────────── */
  async function loadData() {
    try {
      const res = await fetch('people.csv');
      if (!res.ok) throw new Error('CSV not found');
      const text = await res.text();
      const rows = parseCSV(text);
      allPeople = rows.map(r => {
        const d = parseDate(r.birthday);
        return { ...r, _date: d, _isToday: d ? isTodayBirthday(d) : false };
      });
    } catch (e) {
      console.warn('Could not load people.csv, using demo data.', e);
      // Demo fallback so it works even without a server (open file:// locally)
      allPeople = [
        { name: 'Alice Smith',    birthday: '1990-06-15', photo: '', _date: new Date(1990,5,15), _isToday: false },
        { name: 'Carol White',    birthday: '1992-06-03', photo: '', _date: new Date(1992,5,3),  _isToday: false },
        { name: 'Eva Martinez',   birthday: '1995-06-28', photo: '', _date: new Date(1995,5,28), _isToday: false },
        { name: 'Isabella Clark', birthday: '1997-06-19', photo: '', _date: new Date(1997,5,19), _isToday: false },
        { name: 'Bob Jones',      birthday: '1985-03-22', photo: '', _date: new Date(1985,2,22), _isToday: false },
        { name: 'Henry Adams',    birthday: '1983-03-14', photo: '', _date: new Date(1983,2,14), _isToday: false },
        { name: 'David Brown',    birthday: '1988-11-30', photo: '', _date: new Date(1988,10,30),_isToday: false },
        { name: 'Frank Lee',      birthday: '1979-01-10', photo: '', _date: new Date(1979,0,10), _isToday: false },
        { name: 'Grace Kim',      birthday: '2000-09-05', photo: '', _date: new Date(2000,8,5),  _isToday: false },
        { name: 'James Wilson',   birthday: '1991-12-01', photo: '', _date: new Date(1991,11,1), _isToday: false },
      ];
    }
    renderPills();
    render();
  }

  /* ── Nav buttons ─────────────────────────────────── */
  document.getElementById('prev-btn').addEventListener('click', () => {
    currentMonth = (currentMonth + 11) % 12;
    render();
    renderPills();
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    currentMonth = (currentMonth + 1) % 12;
    render();
    renderPills();
  });

  loadData();
</script>
</body>
</html>
